# Prometheus scrape targets for the starstats stack.
# 15-day local retention; relabel jobs by service.namespace where useful.

global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    cluster: voyager
    namespace: starstats

scrape_configs:
- job_name: prometheus
  static_configs:
  - targets: [localhost:9090]

- job_name: otel-collector
  static_configs:
  - targets: [otel-collector:8888]
    labels:
      service: otel-collector
  - targets: [otel-collector:8889]
    labels:
      service: otel-collector-app-metrics

- job_name: starstats-api
  static_configs:
  - targets: [starstats-api:8080]
    labels:
      service: starstats-api
      namespace: starstats
  metrics_path: /metrics

- job_name: starstats-web
  static_configs:
  - targets: [starstats-web:3000]
    labels:
      service: starstats-web
      namespace: starstats
  metrics_path: /api/metrics

- job_name: spicedb
  static_configs:
  - targets: [spicedb:9090]
    labels:
      service: spicedb
      namespace: starstats

- job_name: minio
  static_configs:
  - targets: [starstats-minio:9000]
    labels:
      service: minio
      namespace: starstats
  metrics_path: /minio/v2/metrics/cluster

- job_name: tempo
  static_configs:
  - targets: [tempo:3200]
    labels:
      service: tempo

- job_name: loki
  static_configs:
  - targets: [loki:3100]
    labels:
      service: loki
