name: Release images

# Container + config images for the homelab deploy. Split out from
# `release.yml` in v0.0.2-beta so a registry-side outage stops blocking
# the desktop tray release (Tauri installers + GitHub Release +
# channel manifest). The two workflows share a tag trigger but run
# independently — image failures no longer mark the tray release as
# failed, and either side can be re-run on its own via
# `workflow_dispatch` when the registry comes back.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    name: Build & push container images
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - name: Login to private registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.REGISTRY_URL }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}

    - name: Determine tag
      id: meta
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/v}"
        else
          TAG="dev-${GITHUB_SHA::7}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"

    - name: Build & push API
      uses: docker/build-push-action@v6
      with:
        context: .
        file: crates/starstats-server/Dockerfile
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/starstats/api:latest
          ${{ secrets.REGISTRY_URL }}/starstats/api:${{ steps.meta.outputs.tag }}
          ${{ secrets.REGISTRY_URL }}/starstats/api:${{ github.sha }}
        cache-from: type=gha,scope=api
        cache-to: type=gha,mode=max,scope=api

    - name: Build & push Web
      uses: docker/build-push-action@v6
      with:
        context: .
        file: apps/web/Dockerfile
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/starstats/web:latest
          ${{ secrets.REGISTRY_URL }}/starstats/web:${{ steps.meta.outputs.tag }}
          ${{ secrets.REGISTRY_URL }}/starstats/web:${{ github.sha }}
        # Server Actions encryption key — baked into the bundle at
        # build time so action IDs are stable across deploys. The
        # runtime env must carry the SAME value or the server will
        # fail to decrypt incoming action references. Build-arg
        # syntax (not `secrets:`) because Next reads it as a regular
        # env var via `process.env.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY`
        # inside `next build`. Soft-degrades when the GH secret is
        # unset — expansion is empty, matching the pre-fix behaviour
        # of a fresh random key per build.
        build-args: |
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        cache-from: type=gha,scope=web
        cache-to: type=gha,mode=max,scope=web

  # Thin "config images": each FROM upstream + COPY config. Built so
  # the homelab pulls fully-versioned images instead of bind-mounting
  # configs from a host directory.
  config-images:
    name: Build & push ${{ matrix.image }} config image
    runs-on: ubuntu-latest
    needs: images
    strategy:
      fail-fast: false
      matrix:
        include:
        - { image: otel-collector, context: infra/otel-collector }
        - { image: loki,           context: infra/loki }
        - { image: tempo,          context: infra/tempo }
        - { image: prometheus,     context: infra/prometheus }
        - { image: db-init,        context: infra/init }
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - name: Login to private registry
      uses: docker/login-action@v3
      with:
        registry: ${{ secrets.REGISTRY_URL }}
        username: ${{ secrets.REGISTRY_USERNAME }}
        password: ${{ secrets.REGISTRY_PASSWORD }}
    - name: Determine tag
      id: meta
      run: |
        if [[ "$GITHUB_REF" == refs/tags/* ]]; then
          TAG="${GITHUB_REF#refs/tags/v}"
        else
          TAG="dev-${GITHUB_SHA::7}"
        fi
        echo "tag=$TAG" >> "$GITHUB_OUTPUT"
    - name: Build & push ${{ matrix.image }}
      uses: docker/build-push-action@v6
      with:
        context: ${{ matrix.context }}
        push: true
        tags: |
          ${{ secrets.REGISTRY_URL }}/starstats/${{ matrix.image }}:latest
          ${{ secrets.REGISTRY_URL }}/starstats/${{ matrix.image }}:${{ steps.meta.outputs.tag }}
          ${{ secrets.REGISTRY_URL }}/starstats/${{ matrix.image }}:${{ github.sha }}
        cache-from: type=gha,scope=${{ matrix.image }}
        cache-to: type=gha,mode=max,scope=${{ matrix.image }}
