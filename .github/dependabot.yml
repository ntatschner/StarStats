# Dependabot config for StarStats.
#
# Three ecosystems are watched:
#   - cargo  (Rust workspace at the repo root)
#   - npm    (pnpm workspace at the repo root — apps/* and packages/*)
#   - github-actions (workflows under .github/workflows)
#
# Major bumps for the framework anchors (Tauri, React) are silenced —
# those carry breaking renderer / API changes and we want to handle them
# in dedicated PRs with manual smoke tests, not have Dependabot open them
# alongside routine patch noise.

version: 2
updates:
  # Rust workspace. The root Cargo.toml is the workspace manifest; all
  # member crates inherit shared deps from [workspace.dependencies], so
  # rooting at `/` is enough for Dependabot to see the full graph.
  # Cargo.lock is committed (workspace pattern) and Dependabot will
  # update it automatically when crates bump.
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Tauri 2.x bumps require coordinated checks against the
      # webview / wix bundle / signing pipeline — handle by hand.
      - dependency-name: tauri
        update-types: ["version-update:semver-major"]
      - dependency-name: tauri-plugin-*
        update-types: ["version-update:semver-major"]
      - dependency-name: tauri-build
        update-types: ["version-update:semver-major"]

  # pnpm workspace lives at the repo root (pnpm-workspace.yaml lists
  # apps/* and packages/*). Pointing Dependabot at `/` covers every
  # workspace member through the single root pnpm-lock.yaml.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # React majors land with concurrent-mode / hook-rule changes —
      # take them in a dedicated PR with full e2e re-runs.
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      # Tauri JS API tracks the Rust crate; majors must move in
      # lockstep with the workspace bump.
      - dependency-name: "@tauri-apps/*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
      include: scope
